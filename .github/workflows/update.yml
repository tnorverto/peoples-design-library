name: Rebuild library from Google Sheet

on:
  schedule:
    - cron: "0 6 1,15 * *"   # 06:00 UTC on the 1st and 15th of every month (~every 2 weeks)
  workflow_dispatch: {}       # lets you trigger a rebuild manually from the Actions tab
  push:
    branches: [main]          # also rebuilds whenever you edit the code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml

      - name: Build site from spreadsheet
        env:
          PREV_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python build.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
